<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Demo screenshot: duplicate search results">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f7fb"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#eef6ff"/>
  <rect x="36" y="28" width="888" height="56" rx="10" fill="url(#g)" stroke="#e6eef8"/>
  <text x="68" y="66" font-family="Inter, sans-serif" font-size="20" fill="#0f172a">Duplicate Search — 3 groups found</text>

  <!-- file rows -->
  <g transform="translate(56,110)">
    <rect width="820" height="68" rx="8" fill="#ffffff" stroke="#e6eef8"/>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="16" fill="#0f172a">Photos/IMG_001.jpg</text>
    <text x="700" y="42" font-family="Inter, sans-serif" font-size="13" fill="#64748b">14.2 MB</text>
  </g>

  <g transform="translate(56,190)">
    <rect width="820" height="68" rx="8" fill="#ffffff" stroke="#e6eef8"/>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="16" fill="#0f172a">Photos/IMG_001 (copy).jpg</text>
    <text x="700" y="42" font-family="Inter, sans-serif" font-size="13" fill="#64748b">14.2 MB</text>
  </g>

  <g transform="translate(56,270)">
    <rect width="820" height="68" rx="8" fill="#ffffff" stroke="#e6eef8"/>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="16" fill="#0f172a">Documents/report.pdf</text>
    <text x="700" y="42" font-family="Inter, sans-serif" font-size="13" fill="#64748b">340 KB</text>
  </g>

  <rect x="36" y="372" width="888" height="120" rx="8" fill="#ffffff" stroke="#e6eef8"/>
  <text x="56" y="402" font-family="Inter, sans-serif" font-size="14" fill="#334155">Preview</text>
  <rect x="64" y="420" width="160" height="72" rx="6" fill="#eef3ff"/>
  <text x="64" y="460" font-family="Inter, sans-serif" font-size="12" fill="#475569">Thumbnail</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" rx="12" fill="#fff" stroke="#e6eef7"/>
  <g fill="#f3f6ff"><rect x="20" y="40" width="280" height="24" rx="6"/></g>

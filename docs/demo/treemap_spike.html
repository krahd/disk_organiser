<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Disk Organiser — Treemap UX Spike</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; padding: 20px; color: #222; }
    h1 { margin: 0 0 8px 0; }
    #controls { margin: 12px 0; }
    #treemap { width: 100%; max-width: 1100px; margin: 0 auto; }
    .tooltip { position: absolute; pointer-events: none; background: rgba(0,0,0,0.75); color: white; padding: 6px 8px; border-radius: 4px; font-size: 12px; display: none; z-index: 1000; }
    button { padding: 6px 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Treemap — UX Spike</h1>
  <p>A small prototype treemap to validate visualisation interactions. Click a cell to see details; resize to test responsiveness.</p>
  <div id="controls">
    <button id="reset">Reset View</button>
  </div>
  <div id="treemap"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="treemap_spike.js"></script>
</body>
</html>

name: Debug bottle build (tag trigger)

on:
  push:
    tags:
      - 'debug-push-*'

permissions:
  contents: read

jobs:
  build:
    name: Debug build (tag trigger)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          set -eux
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --upgrade --force-reinstall setuptools==68.2.2 wheel
          python -m pip install -r backend/requirements.txt || true
          python -m pip install pyinstaller==5.13.0 || true
          mkdir -p out
          python -m pip freeze > out/installed.txt

      - name: Build with PyInstaller
        run: |
          . .venv/bin/activate
          mkdir -p out dist
          pyinstaller --noconfirm --clean --onefile --name disk-organiser \
            --add-data "backend:backend" --add-data "frontend:frontend" backend/app.py 2>&1 | tee out/pyinstaller_debug.log || true

      - name: Ensure out exists
        if: always()
        run: |
          mkdir -p out || true

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-bottle-artifacts-push
          path: out

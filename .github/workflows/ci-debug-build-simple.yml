name: CI — Simple Debug PyInstaller build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  debug:
    name: Simple Debug Linux build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt || true
          # Ensure setuptools is present before installing PyInstaller
          python -m pip install --force-reinstall --no-cache-dir setuptools || true
          python -m pip install pyinstaller==5.13.0 || true
          # Diagnostic: show setuptools/pip info
            python -m pip show setuptools || true
            python -m pip list || true
            python - <<'PY' || true
      import sys, os
      import importlib
      print('sys.executable:', sys.executable)
      print('cwd:', os.getcwd())
      print('importlib repr:', repr(importlib))
      print('importlib __file__:', getattr(importlib, '__file__', '<no __file__>'))
      print('importlib __spec__:', getattr(importlib, '__spec__', None))
      try:
        import importlib.util as _util
        print('importlib.util OK, file:', getattr(_util, '__file__', '<no __file__>'))
      except Exception as e:
        print('importlib.util import failed:', e)
      print('importlib attrs sample:', [a for a in dir(importlib) if not a.startswith("__")][:50])
      print('sys.modules["importlib"]:', type(sys.modules.get('importlib')), sys.modules.get('importlib'))
      # detect local files that may shadow stdlib
      print('files in cwd matching importlib*:', [f for f in os.listdir('.') if f.startswith('importlib')])
      try:
        import pkg_resources
        print('pkg_resources import OK:', getattr(pkg_resources, '__file__', None), getattr(pkg_resources, '__version__', None))
      except Exception as e:
        print('pkg_resources import failed:', e)
      print('sys.path:')
      print('\n'.join(sys.path))
      PY

      - name: Run pyinstaller (simple)
        run: |
          . .venv/bin/activate
          mkdir -p out
          set -o pipefail
          pyinstaller --noconfirm --clean --onefile --name disk-organiser \
            --add-data "backend:backend" --add-data "frontend:frontend" backend/app.py 2>&1 | tee out/pyinstaller_debug_linux.log || true
          echo "pyinstaller_exit=$?" >> out/pyinstaller_debug_linux.log || true
          ls -la dist || true
          if [ -f dist/disk-organiser ]; then cp dist/disk-organiser out/ || true; fi

      - name: Package debug binary
        if: always()
        run: |
          mkdir -p out
          if [ -f out/disk-organiser ]; then tar -czf out/disk-organiser-debug-${GITHUB_SHA::7}.tar.gz -C out disk-organiser; fi
          ls -la out

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-artifacts-simple
          path: out

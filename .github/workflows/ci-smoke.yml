name: CI — Smoke Test

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke — upload small artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create small artifact
        run: |
          mkdir -p out
          echo "smoke-run=$GITHUB_RUN_ID" > out/smoke.txt
          echo "branch=$GITHUB_REF" >> out/smoke.txt
          echo "sha=$GITHUB_SHA" >> out/smoke.txt
          ls -la out

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifact
          path: out

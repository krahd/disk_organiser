name: CI Action Test

on:
  push:
    tags:
      - 'ci-test-*'
    branches:
      - 'main'
  workflow_dispatch: {}

jobs:
  noop:
    simple:
      if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
      runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: |
          echo "No-op job to prevent empty-run failures for ${{ github.workflow }} (event: ${{ github.event_name }})"

  simple:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create test artifact and diagnostics
        run: |
          mkdir -p out
          echo "CI test artifact" > out/test.txt
          python - <<'PY'
import sys, pkgutil, json
info = {'python': sys.version, 'platform': sys.platform, 'modules_sample': [m.name for m in pkgutil.iter_modules()][:50]}
open('out/installed.json','w').write(json.dumps(info, indent=2))
PY
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-artifacts
          path: out

  noop-on-push:
    if: ${{ github.event_name == 'push' }}
    name: No-op for push events
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: No-op
        run: |
          echo "No-op: skipping CI action test for push events"

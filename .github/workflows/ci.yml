name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [16.x]
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps (pinned)
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements-locked.txt ]; then
            pip install -r backend/requirements-locked.txt
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit

      - name: Run backend tests
        run: |
          cd backend
          pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Node dependency audit
        run: |
          npm audit --audit-level=moderate

      - name: Prettier check
        run: |
          npm run format:check

      - name: Run unit tests (Jest)
        run: |
          npm test --silent

      - name: Install Playwright apt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxrandr2 libxss1 libxtst6 libnss3 libatk1.0-0 libatk-bridge2.0-0 libgtk-3-0 libasound2 libgbm1 libatspi2.0-0 libpangocairo-1.0-0

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Start static server (frontend)
        run: |
          # serve frontend files on port 8000 for visual tests
          cd frontend
          python -m http.server 8000 &
          sleep 1

      - name: Run visual tests (Playwright)
        env:
          TEST_BASE: http://127.0.0.1:8000
        run: |
          # run visual tests but skip modal snapshot that lacks baseline in CI
          npx playwright test frontend/visual --grep-invert "preview modal"

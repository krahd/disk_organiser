<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disk Organiser</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <h1>Disk Organiser</h1>
    </header>
    <nav>
        <button id="nav-duplicates">Duplicate Search</button>
        <button id="nav-visualisation">Visualisation</button>
        <button id="nav-recycle">Recycle</button>
        <button id="nav-organise">Organise</button>
        <button id="nav-preferences">Preferences</button>
    </nav>
    <main id="main-content">
        <!-- Content will be loaded here -->
    </main>
    <script src="main.js"></script>
    <!-- Preview modal (hidden by default) -->
    <div id="preview-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" id="preview-modal-backdrop"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
            <div class="modal-header">
                <h3 id="preview-modal-title">Preview</h3>
                <button id="preview-modal-close" aria-label="Close">×</button>
            </div>
            <div class="modal-body" id="preview-modal-body"></div>
            <div class="modal-footer" id="preview-modal-footer"></div>
        </div>
    </div>
</body>
</html>

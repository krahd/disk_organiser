<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disk Organiser</title>
    <link rel="icon" href="images/logo.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <!-- D3 will be lazy-loaded by the app when needed -->
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <img src="images/logo.svg" alt="Disk Organiser logo" class="logo" />
        <div class="title">
          <h1>Disk Organiser</h1>
          <p class="tagline">Find duplicates, visualise and organise your files</p>
        </div>
      </div>
    </header>

    <div class="app">
      <nav class="site-nav" role="navigation" aria-label="Main">
        <button id="nav-duplicates" class="nav-btn" aria-pressed="false">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <rect x="3" y="3" width="10" height="10" rx="2"></rect>
            <rect x="9" y="9" width="12" height="12" rx="2" opacity="0.7"></rect>
          </svg>
          Duplicate Search
        </button>
        <button id="nav-visualisation" class="nav-btn" aria-pressed="false">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <rect x="3" y="3" width="8" height="8"></rect>
            <rect x="12" y="3" width="9" height="4"></rect>
            <rect x="12" y="8" width="9" height="7"></rect>
          </svg>
          Visualisation
        </button>
        <button id="nav-recycle" class="nav-btn" aria-pressed="false">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M21 12a9 9 0 1 1-2.6-6.1l1.4 1.4V4h-4l1.7 1.7A9 9 0 0 1 21 12z"></path>
          </svg>
          Recycle
        </button>
        <button id="nav-organise" class="nav-btn" aria-pressed="false">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 7h6l2 2h10v8a2 2 0 0 1-2 2H3z"></path>
          </svg>
          Organise
        </button>
        <button id="nav-preferences" class="nav-btn" aria-pressed="false">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"></path>
          </svg>
          Preferences
        </button>
      </nav>

      <main id="main-content" class="main-card">
        <!-- Content will be loaded here -->
      </main>
      <aside
        id="side-panel"
        class="side-panel hidden"
        aria-hidden="true"
        role="complementary"
        aria-labelledby="side-panel-title"
        tabindex="-1"
      >
        <div class="side-panel-header">
          <h3 id="side-panel-title">Details</h3>
          <button id="side-panel-close" aria-label="Close details">×</button>
        </div>
        <div id="side-panel-body" class="side-panel-body"></div>
      </aside>
    </div>
    <script src="main.js"></script>
    <!-- Preview modal (hidden by default) -->
    <div id="preview-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" id="preview-modal-backdrop"></div>
      <div
        class="modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="preview-modal-title"
      >
        <div class="modal-header">
          <h3 id="preview-modal-title">Preview</h3>
          <button id="preview-modal-close" aria-label="Close">×</button>
        </div>
        <div class="modal-body" id="preview-modal-body"></div>
        <div class="modal-footer" id="preview-modal-footer"></div>
      </div>
    </div>
  </body>
</html>

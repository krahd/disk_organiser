<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb" />
      <stop offset="100%" stop-color="#eef3f8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="0"/>

  <!-- Header -->
  <rect x="0" y="10" width="1200" height="72" fill="#ffffff" stroke-opacity="0.04" rx="0"/>
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="56" height="56" rx="8" fill="url(#accent)" />
    <text x="72" y="28" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Disk Organiser</text>
    <text x="72" y="48" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Find duplicates, visualise and organise</text>
  </g>

  <!-- Nav -->
  <g transform="translate(180,100)" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#6b7280">
    <rect x="-160" y="0" width="960" height="44" rx="12" fill="transparent" />
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="150" height="40" rx="10" fill="#ffffff" stroke="#eef3f8"/>
      <text x="20" y="25" fill="#2563eb">Duplicate Search</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="0" y="0" width="150" height="40" rx="10" fill="#ffffff" stroke="#eef3f8"/>
      <text x="20" y="25">Visualisation</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="110" height="40" rx="10" fill="#ffffff" stroke="#eef3f8"/>
      <text x="14" y="25">Recycle</text>
    </g>
    <g transform="translate(470,0)">
      <rect x="0" y="0" width="120" height="40" rx="10" fill="#ffffff" stroke="#eef3f8"/>
      <text x="18" y="25">Organise</text>
    </g>
    <g transform="translate(610,0)">
      <rect x="0" y="0" width="130" height="40" rx="10" fill="#ffffff" stroke="#eef3f8"/>
      <text x="18" y="25">Preferences</text>
    </g>
  </g>

  <!-- Main card -->
  <g transform="translate(100,170)">
    <rect x="0" y="0" width="1000" height="460" rx="14" fill="#ffffff" stroke="#e6eef7"/>
    <text x="24" y="40" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Duplicate Search</text>
    <text x="24" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">Find duplicate files on your hard drive and preview safe organise actions.</text>

    <!-- Left column: form -->
    <g transform="translate(24,96)">
      <rect x="0" y="0" width="420" height="300" rx="10" fill="#fbfdff" stroke="#f3f6fa"/>
      <text x="16" y="28" font-size="13" fill="#6b7280">Path</text>
      <rect x="16" y="36" width="380" height="36" rx="6" fill="#ffffff" stroke="#e6eef7"/>
      <text x="22" y="60" font-size="12" fill="#9aa4b2">/path/to/scan</text>

      <text x="16" y="110" font-size="13" fill="#6b7280">Min size (bytes)</text>
      <rect x="16" y="118" width="120" height="36" rx="6" fill="#ffffff" stroke="#e6eef7"/>

      <rect x="16" y="170" width="140" height="40" rx="8" fill="url(#accent)"/>
      <text x="44" y="197" fill="#ffffff" font-weight="700">Run</text>
    </g>

    <!-- Right column: results list -->
    <g transform="translate(470,96)">
      <rect x="0" y="0" width="480" height="300" rx="8" fill="#fcfdff" stroke="#f3f6fa"/>
      <text x="18" y="28" font-size="14" fill="#0f172a">Results</text>
      <g transform="translate(12,44)">
        <rect x="0" y="0" width="456" height="72" rx="8" fill="#ffffff" stroke="#f3f6fa"/>
        <text x="12" y="28" font-size="12" fill="#0f172a">Group 1 — 3 files — 12.4 MB</text>
        <text x="12" y="48" font-size="11" fill="#6b7280">/path/to/fileA.txt</text>
      </g>
      <g transform="translate(12,128)">
        <rect x="0" y="0" width="456" height="72" rx="8" fill="#ffffff" stroke="#f3f6fa"/>
        <text x="12" y="28" font-size="12" fill="#0f172a">Group 2 — 2 files — 4.2 MB</text>
        <text x="12" y="48" font-size="11" fill="#6b7280">/path/to/another.pdf</text>
      </g>
    </g>
  </g>

  <!-- Footer hint -->
  <text x="24" y="690" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9aa4b2">Screenshot: frontend/index.html (generated)</text>
</svg>
